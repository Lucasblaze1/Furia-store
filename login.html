<h2>Login</h2>
<input id="user">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>

<script>
function login(){
 fetch('/api/login',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({
    user: user.value,
    senha: senha.value
  })
 }).then(r=>r.json())
 .then(d=>{
  if(d.ok) location.href='admin.html';
  else alert('Erro');
 })
}
</script>
